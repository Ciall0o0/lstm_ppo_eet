data:
  datasets_dir: "datasets"
  train_ratio: 0.70
  val_ratio: 0.15
  test_ratio: 0.15
  random_seed: 42

env:
  num_elevators: 3
  num_floors: 10
  max_load_kg: 900
  floor_travel_time: 2.0
  accel_decel_time: 1.0
  door_open_time: 2.0
  door_close_time: 2.5
  dwell_time: 3.0
  idle_timeout: 60.0
  long_wait_threshold: 60.0
  max_total_time: 1800.0

model:
  state_dim: 93
  lstm_hidden: 128
  lstm_layers: 2
  lstm_dropout: 0.2
  actor_hidden: 64
  critic_hidden: 64
  action_dim: 3

ppo:
  learning_rate: 3.0e-4
  gamma: 0.99
  gae_lambda: 0.95
  clip_epsilon: 0.25
  value_loss_coef: 0.5
  entropy_coef: 0.02
  max_grad_norm: 4.0
  ppo_epochs: 10
  batch_size: 128
  rollout_steps: 2048
  seq_len: 64

training:
  total_epochs: 100
  eval_every: 5
  early_stop_patience: 20
  save_dir: "checkpoints"
  log_interval: 10

reward:
  passenger_delivered: 5.0
  wait_time_per_sec: -0.1
  empty_distance_per_floor: -0.15
  energy_per_start_stop: -0.05
  idle_penalty_per_sec: -0.02

plc:
  ip: "192.168.0.1"
  rack: 0
  slot: 1
  timeout_ms: 1000
  poll_interval_ms: 100
  db_number: 1
