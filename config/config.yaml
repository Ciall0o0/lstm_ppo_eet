data:
  datasets_dir: "datasets"
  train_ratio: 0.70
  val_ratio: 0.15
  test_ratio: 0.15
  random_seed: 42

env:
  num_elevators: 3
  num_floors: 10
  max_load_kg: 900
  floor_travel_time: 2.0
  accel_decel_time: 1.0
  door_open_time: 2.0
  door_close_time: 2.5
  dwell_time: 3.0
  idle_timeout: 60.0
  long_wait_threshold: 60.0
  max_total_time: 5400.0

model:
  state_dim: 104
  lstm_hidden: 256
  lstm_layers: 2
  lstm_dropout: 0.1
  actor_hidden: 128
  critic_hidden: 128
  action_dim: 3
  # Architecture options
  encoder_type: "lstm"         # "lstm" or "gru"
  activation: "relu"           # "relu", "gelu", or "silu"
  use_head_layernorm: false    # LayerNorm in actor/critic MLP heads

ppo:
  learning_rate: 5.0e-4
  gamma: 0.99
  gae_lambda: 0.95
  clip_epsilon: 0.2
  value_loss_coef: 0.5
  entropy_coef_start: 0.10
  entropy_coef_end: 0.03
  max_grad_norm: 5.0
  ppo_epochs: 8
  batch_size: 8192
  rollout_steps: 32768
  seq_len: 32
  weight_decay: 1.0e-4
  compile_policy: true
  # AMP mixed precision (GPU only)
  use_amp: false
  # KL early stopping (stops PPO epochs early if KL exceeds target)
  kl_early_stop: true
  kl_target: 0.01
  # Advantage normalization
  normalize_advantage: true

training:
  total_epochs: 200
  eval_every: 10
  early_stop_patience: 30
  save_dir: "checkpoints"
  num_envs: 32
  # LR warmup
  warmup_epochs: 5             # linear warmup epochs (0 to disable)
  warmup_ratio: 0.1            # initial LR = lr * warmup_ratio
  # Resume from checkpoint (set to path or leave empty)
  resume_checkpoint: ""

reward:
  passenger_delivered: 50.0
  wait_time_per_sec: -0.01
  empty_distance_per_floor: -0.02
  energy_per_start_stop: -0.01
  idle_penalty_per_sec: -0.02
  idle_center_bonus: 0.005
  idle_spread_penalty: -0.01
  assignment_dist_per_floor: -1.0

plc:
  ip: "192.168.0.1"
  rack: 0
  slot: 1
  timeout_ms: 1000
  poll_interval_ms: 100
  db_number: 1
