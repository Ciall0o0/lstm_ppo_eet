data:
  datasets_dir: "datasets"
  train_ratio: 0.70
  val_ratio: 0.15
  test_ratio: 0.15
  random_seed: 42

env:
  num_elevators: 3
  num_floors: 10
  max_load_kg: 900
  floor_travel_time: 2.0
  accel_decel_time: 1.0
  door_open_time: 2.0
  door_close_time: 2.5
  dwell_time: 3.0
  idle_timeout: 60.0
  long_wait_threshold: 60.0
  max_total_time: 5400.0

model:
  # state_dim and action_dim are derived from ElevatorEnv at runtime; these are informational only
  state_dim: 104
  lstm_hidden: 128
  lstm_layers: 1
  lstm_dropout: 0.0               # dead code when lstm_layers=1, set to 0 for clarity
  actor_hidden: 128
  critic_hidden: 128
  action_dim: 3
  activation: "relu"           # "relu", "gelu", or "silu"
  actor_dropout: 0.1
  critic_dropout: 0.1
  use_layer_norm: true

ppo:
  learning_rate: 3.0e-04          # higher LR for faster policy learning
  gamma: 0.99
  gae_lambda: 0.95
  clip_epsilon: 0.18133817135484062
  value_loss_coef: 0.6999622009212532
  entropy_coef_start: 0.01        # low for 3-action space (log(3)≈1.1)
  entropy_coef_end: 0.001         # minimal late-training pressure
  max_grad_norm: 2.400298736924491
  ppo_epochs: 10                  # more gradient steps per collection
  batch_size: 8192
  rollout_steps: 32768
  seq_len: 32
  weight_decay: 6.69907663855107e-04
  compile_policy: true
  # AMP mixed precision (GPU only)
  use_amp: true
  # KL early stopping (stops PPO epochs early if KL exceeds target)
  kl_early_stop: true
  kl_target: 0.01
  # Advantage normalization (disabled to preserve raw advantage signal)
  normalize_advantage: false

training:
  total_epochs: 200
  eval_every: 10
  early_stop_patience: 15
  save_dir: "checkpoints"
  num_envs: 32
  # LR warmup
  warmup_epochs: 5             # linear warmup epochs (0 to disable)
  warmup_ratio: 0.1            # initial LR = lr * warmup_ratio
  # Resume from checkpoint (set to path or leave empty)
  resume_checkpoint: ""

reward:
  passenger_delivered: 1.0        # time-decayed: full reward for instant delivery, 0 at long_wait_threshold
  wait_time_per_sec: -0.01        # per-passenger per-second wait penalty
  empty_distance_per_floor: -0.05 # penalty for empty repositioning
  energy_per_start_stop: -0.02    # energy cost per start/stop
  idle_penalty_per_sec: -0.02     # increased from -0.005 (4x stronger)
  idle_center_bonus: 0.005        # per-second bonus for idle elevators near center
  idle_spread_penalty: -0.01      # per-second penalty per additional idle elevator on same floor
  assignment_dist_per_floor: -0.3 # penalty for assigning to distant elevator
  # Reward normalization: batch-level in PPOTrainer (not per-env)
  normalize: false
  clip_range: 5.0

plc:
  ip: "192.168.0.1"
  rack: 0
  slot: 1
  timeout_ms: 1000
  poll_interval_ms: 100
  db_input: 10
  db_output: 11
