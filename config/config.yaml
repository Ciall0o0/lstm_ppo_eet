data:
  datasets_dir: "datasets"
  train_ratio: 0.70
  val_ratio: 0.15
  test_ratio: 0.15
  random_seed: 42

env:
  num_elevators: 3
  num_floors: 10
  max_load_kg: 900
  floor_travel_time: 2.0
  accel_decel_time: 1.0
  door_open_time: 2.0
  door_close_time: 2.5
  dwell_time: 3.0
  idle_timeout: 60.0
  long_wait_threshold: 60.0
  max_total_time: 3600.0

model:
  # state_dim and action_dim are derived from ElevatorEnv at runtime; these are informational only
  state_dim: 109
  lstm_hidden: 256
  lstm_layers: 2
  lstm_dropout: 0.1
  actor_hidden: 64
  critic_hidden: 64
  action_dim: 3
  activation: "relu"
  actor_dropout: 0.0
  critic_dropout: 0.0
  use_layer_norm: true

ppo:
  learning_rate: 3.0e-04
  gamma: 0.99
  gae_lambda: 0.95
  clip_epsilon: 0.20
  value_loss_coef: 0.70
  entropy_coef_start: 0.01
  entropy_coef_end: 0.001
  entropy_floor: 0.0
  max_grad_norm: 1.0
  ppo_epochs: 10
  batch_size: 8192
  rollout_steps: 32768
  seq_len: 32
  burn_in_steps: 8
  weight_decay: 0.0001
  compile_policy: false
  use_amp: true
  kl_early_stop: true
  kl_target: 0.01
  normalize_advantage: false
  normalize_rewards: false

training:
  total_epochs: 200
  eval_every: 5
  early_stop_patience: 20
  save_dir: "checkpoints"
  num_envs: 16
  warmup_epochs: 0
  warmup_ratio: 0.1
  resume_checkpoint: ""

reward:
  passenger_delivered: 3.0             # 10x increase — delivery must dominate shaping
  wait_time_per_sec: -0.001
  empty_distance_per_floor: -0.005
  energy_per_start_stop: -0.002
  idle_penalty_per_sec: -0.005
  # Assignment-level shaping: immediate reward at decision time (dt=0).
  # Keep small relative to r_passenger so delivery stays the primary signal.
  assignment_proximity: -2.0           # per floor distance (5 floors → -10)
  assignment_direction_align: 1.5      # reward for aligned direction
  assignment_load_balance: -1.5        # per already-assigned passenger
  assignment_estimated_wait: -0.03     # per second of estimated pickup time
  normalize: false
  clip_range: 5.0

plc:
  ip: "192.168.0.1"
  rack: 0
  slot: 1
  timeout_ms: 1000
  poll_interval_ms: 100
  db_input: 10
  db_output: 11
